<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>image-compressor</title>
</head>

<body>
  <div id="root">
    <div style="font-family: sans-serif; text-align: center; padding-top: 50px; color: #666;">
      Loading application...<br>
      <small>If this persists, JavaScript failed to load.</small>
      <div id="error-log"
        style="color: red; text-align: left; margin: 20px; white-space: pre-wrap; font-family: monospace;"></div>
    </div>
  </div>
  <script>
    window.onerror = function (msg, url, line, col, error) {
      var log = document.getElementById('error-log');
      log.innerText += "Error: " + msg + "\nURL: " + url + "\nLine: " + line + "\n\n";
      return false;
    };
    window.onunhandledrejection = function (e) {
      var log = document.getElementById('error-log');
      log.innerText += "Promise Error: " + e.reason + "\n\n";
    };
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
